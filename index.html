<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claim a Reward</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-top:#083a63;
      --bg-mid:#0b6ea6;
      --bg-bottom:#0aa0d8;
      --text:#eaf7ff;
      --muted:#cfe9f7;
      --gold1:#ffd35a;
      --gold2:#f4a72b;
      --gold3:#d77a08;
      --panelShadow: 0 18px 40px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);

      /* background gradient */
      background:
        radial-gradient(1100px 680px at 50% -120px, rgba(255,255,255,.10), transparent 60%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
      overflow-x:hidden;
    }

    /* subtle diamond pattern like the screenshot */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(45deg, rgba(255,255,255,.06) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.06) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,.06) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.06) 75%);
      background-size: 70px 70px;
      background-position: 0 0, 0 35px, 35px -35px, -35px 0px;
      opacity:.18;
      pointer-events:none;
    }

    .page{
      position:relative;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .center{
      width:min(560px, 92vw);
      margin-top:48px;
      text-align:center;
      padding:10px 12px 0;
    }

    /* Replace this with your own logo image if you want */
    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:8px;
      user-select:none;
    }
    .brandBadge{
      width:52px;height:52px;
      border-radius:14px;
      background:linear-gradient(180deg, #ffe08b, #ffb134);
      display:grid;place-items:center;
      color:#3a2300;
      font-weight:900;
      box-shadow: 0 12px 25px rgba(0,0,0,.25);
    }
    .brandTitle{
      font-weight:900;
      letter-spacing:.6px;
      text-transform:uppercase;
      font-size:30px;
      line-height:1;
      text-shadow: 0 3px 0 rgba(0,0,0,.18);
      margin:0;
    }

    .subtitle{
      margin:8px 0 14px;
      font-size:13px;
      color:rgba(255,255,255,.9);
      font-weight:600;
    }

    .qr{
      width:170px;height:170px;
      margin:0 auto 14px;
      background:white;
      border-radius:6px;
      padding:10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .qr img{ width:100%; height:100%; display:block; }

    /* gold “game-style” button */
    .btn{
  font-family: 'Luckiest Guy', cursive;
  font-size: 20px;
  letter-spacing: 1px;
  text-transform: capitalize;

  color: white;

  -webkit-text-stroke: 1px #000;   /* black outline */
  text-shadow:
    0 3px 0 #000,
    0 4px 6px rgba(0,0,0,.4);

  padding: 12px 20px;
  border-radius: 8px;
  border: 2px solid #7a3c00;

  background: linear-gradient(180deg, #ffd35a 0%, #f4a72b 60%, #d77a08 100%);
  box-shadow:
    0 6px 0 rgba(0,0,0,.22),
    inset 0 2px 0 rgba(255,255,255,.35);

  cursor: pointer;
}
    .btn:active{ transform: translateY(2px); }

    .hint{
      margin:12px 0 10px;
      font-size:13px;
      color:#cfe9f7;
      font-weight:700;
      line-height:1.2;
    }
    .hint span{ color:#ffd35a; }

    .stores{
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
      margin-top:8px;
      flex-wrap:wrap;
    }
    .store{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:6px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      color:white;
      text-decoration:none;
      font-size:12px;
      box-shadow: 0 10px 25px rgba(0,0,0,.2);
    }
    .store .small{ font-size:10px; opacity:.9; display:block; }
    .store .big{ font-size:12px; font-weight:800; display:block; line-height:1.05; }

    /* mascot area */
    .mascotWrap{
      flex:1;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      width:100%;
      padding-bottom:70px;
      pointer-events:none;
    }
    .mascot{
      width:min(340px, 70vw);
      filter: drop-shadow(0 18px 35px rgba(0,0,0,.35));
      opacity:.98;
    }

    /* footer bar */
    footer{
      width:100%;
      background:rgba(0,0,0,.60);
      border-top:1px solid rgba(255,255,255,.14);
      padding:16px 18px;
      font-size:11px;
      color:rgba(255,255,255,.75);
    }
    footer .row{
      max-width:1100px;
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    footer a{
      color:rgba(255,255,255,.82);
      text-decoration:none;
    }
    footer a:hover{ text-decoration:underline; }

    @media (max-width:520px){
      .center{ margin-top:34px; }
      .brandTitle{ font-size:24px; }
      .qr{ width:155px;height:155px; }
      .mascotWrap{ padding-bottom:92px; }
    }
    .brandLogo{
        width: 260px;
        max-width: 80vw;
        height: auto;
        display:block;
        margin: 0 auto 8px;
        filter: drop-shadow(0 6px 0 rgba(0,0,0,.18));
}
.bottom-character{
  position: absolute;
  bottom: 0px; /* space above footer */
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}

.bottom-character img{
  width: 150px;   /* adjust size here */
  max-width: 90vw;
  height: auto;
  filter: drop-shadow(0 25px 40px rgba(0,0,0,.35));
}
.popup-overlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-overlay.show{
  display:flex;
}

.popup-box{
  width: min(600px, 95vw);
  max-height: 80vh;
  overflow-y: auto;
  background: #0f2f45;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 20px 50px rgba(0,0,0,.5);
  color: white;
}

.popup-header{
  display:flex;
  justify-content: space-between;
  align-items:center;
  margin-bottom:10px;
  font-weight: bold;
}

.popup-header button{
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}
  </style>
</head>

<body>
  <div class="page">
    <div class="center">
      <div class="brand">
       <img class="brandLogo" src="C:\Users\ULTRAPC\Desktop\CPA\clash\logo.png" alt="Your Brand Logo">
      </div>
    

      <div class="subtitle">Claim a Reward in Your Game!</div>

      <div class="qr">
        <!-- Put your QR image here -->
        <img src="C:\Users\ULTRAPC\Desktop\CPA\clash\frame.png" alt="QR code">
      </div>

      <button class="btn" id="claimBtn">Claim Reward</button>

      <div class="hint">
        If nothing happens, first<br>
        download the game <span>👇</span>
      </div>

      <div class="stores">
        <a class="store" id="gp" href="#" target="_blank" rel="noreferrer">
          <span>▶</span>
          <span>
            <span class="small">GET IT ON</span>
            <span class="big">Google Play</span>
          </span>
        </a>

        <a class="store" id="as" href="#" target="_blank" rel="noreferrer">
          <span></span>
          <span>
            <span class="small">Download on the</span>
            <span class="big">App Store</span>
          </span>
        </a>
      </div>
    </div>

    <!-- Replace with your own mascot image -->
    <div class="mascotWrap">
      <img class="mascot" src="assets/mascot.png" alt="" aria-hidden="true">
    </div>

    <footer>
      <div class="row">
        <div>
          <a href="#">Parent’s guide</a> &nbsp; <a href="#">Terms &amp; Service</a> &nbsp; <a href="#">Privacy Policy</a>
        </div>
        <div>© <span id="year"></span> YourBrand</div>
      </div>
    </footer>
  </div>

  <script>
    // ===== Change these to your real links =====
   
    const GOOGLE_PLAY_URL = "https://play.google.com/store";
    const APP_STORE_URL = "https://www.apple.com/app-store/";

    document.getElementById("claimBtn").addEventListener("click", () => {
      window.location.href = CLAIM_URL;
    });
    document.getElementById("gp").href = GOOGLE_PLAY_URL;
    document.getElementById("as").href = APP_STORE_URL;
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  <div class="bottom-character">
  <img src="C:\Users\ULTRAPC\Desktop\CPA\clash\logo2.png" alt="Character">
</div>
<!-- Offers Popup -->
<div id="offersPopup" class="popup-overlay">
  <div class="popup-box">
    <div class="popup-header">
      <span>Sponsored Offers</span>
      <button id="closePopup">✕</button>
    </div>

    <div id="offersContent"></div>
  </div>
</div>
<script>
let offersLoaded = false;

function loadOffersIntoPopup() {
  if (offersLoaded) return;
  offersLoaded = true;

  // Config script
  const configScript = document.createElement("script");
  configScript.type = "text/javascript";
  configScript.innerHTML = 'var FQcuA_lGR_nYzadc={"it":4567138,"key":"884e1"};';
  document.getElementById("offersContent").appendChild(configScript);

  // External script
  const mainScript = document.createElement("script");
  mainScript.src = "https://d3v3431sr9puku.cloudfront.net/8e668bb.js";
  mainScript.async = true;

  document.getElementById("offersContent").appendChild(mainScript);
}

// Open popup on button click
document.getElementById("claimBtn").addEventListener("click", function(e){
  e.preventDefault();
  document.getElementById("offersPopup").classList.add("show");
  loadOffersIntoPopup();
});

// Close popup
document.getElementById("closePopup").addEventListener("click", function(){
  document.getElementById("offersPopup").classList.remove("show");
});

// Close when clicking outside
document.getElementById("offersPopup").addEventListener("click", function(e){
  if(e.target === this){
    this.classList.remove("show");
  }
});
</script>
</body>
</html>
